<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lead Scraper Dashboard</title>

  <style>
   @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca&display=swap');
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
        font-family: 'Lexend Deca', 'Helvetica Neue', Helvetica, sans-serif;
    }

    body{
      font-family: 'Lexend Deca', 'Helvetica Neue', Helvetica, sans-serif;
      background:#020617;
      color:white;
      padding:30px;
    }

    .container{
      max-width:1600px;
      margin:auto;
    }

    .title{
      text-align:center;
      margin-bottom:30px;
      font-size:34px;
      font-weight:bold;
    }

    .form-card{
      background:#0f172a;
      padding:25px;
      border-radius:16px;
      border:1px solid #1e293b;
      margin-bottom:25px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
      font-size:14px;
    }

    input::placeholder{
      color:#94a3b8;
    }

    .btn-area{
      margin-top:20px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding:13px 22px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
      font-size:14px;
    }

    .primary-btn{
      background:#22c55e;
      color:white;
    }

    .primary-btn:hover{
      background:#16a34a;
    }

    .download-btn{
      background:#2563eb;
      color:white;
    }

    .download-btn:hover{
      background:#1d4ed8;
    }

    .loader{
      margin-top:20px;
      text-align:center;
      font-size:18px;
      display:none;
      color:#38bdf8;
    }

    .stats{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    .stat-box{
      background:#0f172a;
      border:1px solid #1e293b;
      padding:20px;
      border-radius:12px;
      min-width:200px;
    }

    .stat-title{
      color:#94a3b8;
      font-size:13px;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:28px;
      font-weight:bold;
    }

    .table-wrapper{
      overflow-x:auto;
      background:#0f172a;
      border-radius:16px;
      border:1px solid #1e293b;
      display:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#1e293b;
      padding:16px;
      text-align:left;
      font-size:14px;
      color:#cbd5e1;
      white-space:nowrap;
    }

    td{
      padding:15px;
      border-top:1px solid #1e293b;
      font-size:14px;
      vertical-align:top;
      line-height:1.5;
    }

    tr:hover{
      background:#111827;
    }

    a{
      color:#38bdf8;
      text-decoration:none;
      word-break:break-all;
    }

    .empty{
      padding:40px;
      text-align:center;
      color:#94a3b8;
    }

    .snippet{
      min-width:350px;
    }

    .url-cell{
      min-width:250px;
    }

    .title-cell{
      min-width:250px;
    }

    @media(max-width:768px){

      body{
        padding:15px;
      }

      .title{
        font-size:24px;
      }

      td{
        font-size:13px;
      }

    }

  </style>

</head>

<body>

<div class="container">

  <div class="title">
     Lead Scraper Dashboard
  </div>

  <div class="form-card">

    <form id="leadForm">

      <div class="form-grid">

        <input
          type="text"
          id="criteria"
          placeholder="Role (Marketing Manager)"
          required
        />

        <input
          type="text"
          id="location"
          placeholder="Location (India)"
          required
        />

        <input
          type="text"
          id="industry"
          placeholder="Industry (SaaS)"
        />

      

      </div>

      <div class="btn-area">

        <button type="submit" class="primary-btn">
          Start Scraping
        </button>

        <button type="button" class="download-btn" onclick="downloadCSV()">
          Download CSV
        </button>

        <button type="button" class="download-btn" onclick="downloadJSON()">
          Download JSON
        </button>

      </div>

    </form>

    <div class="loader" id="loader">
      ⏳ Scraping Leads...
    </div>

  </div>

  <div class="stats">

    <div class="stat-box">
      <div class="stat-title">Total Leads</div>
      <div class="stat-value" id="leadCount">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-title">Status</div>
      <div class="stat-value" id="statusText">Null</div>
    </div>

  </div>

  <div class="table-wrapper" id="tableWrapper">

    <table>

      <thead>
        <tr>
          <th>Name</th>
          <th>Linkedin URL</th>
          <th>Email</th>
          <th>Phone No</th>
          <th>Snippet</th>
          <th>Company</th>
          <th>Raw Title</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>

    </table>

  </div>

</div>

<script>

  // =========================================
  // WEBHOOK URL
  // =========================================

  const webhookURL =
    "https://kiruba202.app.n8n.cloud/webhook/lead-scrape";

  // =========================================
  // GLOBAL DATA
  // =========================================

  let globalData = [];

  // =========================================
  // FORM SUBMIT
  // =========================================

  document
    .getElementById("leadForm")
    .addEventListener("submit", async function (e) {

      e.preventDefault();

      document.getElementById("loader").style.display = "block";

      document.getElementById("statusText").innerText = "Running";

      document.getElementById("tableWrapper").style.display = "none";

      const payload = {

        criteria:
          document.getElementById("criteria").value,

        location:
          document.getElementById("location").value,

        industry:
          document.getElementById("industry").value,

     

      };

      try {

        const response = await fetch(webhookURL, {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify(payload)

        });

        if (!response.ok) {

          throw new Error(
            `HTTP Error: ${response.status}`
          );

        }

        const result = await response.json();

        console.log("Webhook Response:", result);

        // =====================================
        // ARRAY FORMAT
        // =====================================

        const finalData = Array.isArray(result)
          ? result
          : [result];

        globalData = finalData;

        renderTable(finalData);

        document.getElementById("leadCount").innerText =
          finalData.length;

        document.getElementById("statusText").innerText =
          "Completed";

      } catch (error) {

        console.error(error);

        document.getElementById("statusText").innerText =
          "Failed";

        alert("Error connecting to n8n");

      } finally {

        document.getElementById("loader").style.display =
          "none";

      }

    });

  // =========================================
  // CLEAN PHONE NUMBER
  // =========================================

  function cleanPhone(phone){

    if(!phone) return "-";

    // Remove non digits
    const digits =
      phone.replace(/\D/g,'');

    // Reject linkedin numeric ids
    if(digits.length < 10){
      return "-";
    }

    return phone;

  }

  // =========================================
  // RENDER TABLE
  // =========================================

  function renderTable(data) {

    const tbody =
      document.getElementById("tableBody");

    tbody.innerHTML = "";

    // =====================================
    // EMPTY CHECK
    // =====================================

    if (!data || data.length === 0) {

      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="empty">
            No Leads Found
          </td>
        </tr>
      `;

      document.getElementById("tableWrapper").style.display =
        "block";

      return;

    }

    // =====================================
    // LOOP DATA
    // =====================================

    data.forEach((item) => {

      const row = `
        <tr>

          <td>
            ${item.name || "-"}
          </td>

          <td class="url-cell">
            ${
              item.profileUrl
                ? `<a href="${item.profileUrl}" target="_blank">
                    ${item.profileUrl}
                  </a>`
                : "-"
            }
          </td>

          <td>
            ${item.primaryEmail || "-"}
          </td>

          <td>
            ${cleanPhone(item.phone)}
          </td>

          <td class="snippet">
            ${item.snippet || "-"}
          </td>

          <td>
            ${item.company || "-"}
          </td>

          <td class="title-cell">
            ${item.rawTitle || "-"}
          </td>

        </tr>
      `;

      tbody.innerHTML += row;

    });

    document.getElementById("tableWrapper").style.display =
      "block";

  }

  // =========================================
  // DOWNLOAD CSV
  // =========================================

  function downloadCSV() {

    if(globalData.length === 0){

      alert("No data available");

      return;

    }

    let csv =
      "Name,LinkedinURL,Email,PhoneNo,Snippet,Company,RawTitle\n";

    globalData.forEach((item) => {

      csv +=
        `"${item.name || ""}",` +
        `"${item.profileUrl || ""}",` +
        `"${item.primaryEmail || ""}",` +
        `"${cleanPhone(item.phone)}",` +
        `"${item.snippet || ""}",` +
        `"${item.company || ""}",` +
        `"${item.rawTitle || ""}"\n`;

    });

    const blob = new Blob([csv], {
      type: "text/csv"
    });

    const url =
      window.URL.createObjectURL(blob);

    const a =
      document.createElement("a");

    a.href = url;

    a.download = "leads.csv";

    a.click();

  }

  // =========================================
  // DOWNLOAD JSON
  // =========================================

  function downloadJSON() {

    if(globalData.length === 0){

      alert("No data available");

      return;

    }

    const blob = new Blob(

      [JSON.stringify(globalData, null, 2)],

      {
        type: "application/json"
      }

    );

    const url =
      window.URL.createObjectURL(blob);

    const a =
      document.createElement("a");

    a.href = url;

    a.download = "leads.json";

    a.click();

  }

</script>

</body>
</html>
